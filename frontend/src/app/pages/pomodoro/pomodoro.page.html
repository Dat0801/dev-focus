<ion-header class="ion-no-border">
  <ion-toolbar class="header-toolbar">
    <div class="header-content ion-padding-horizontal">
      <div class="header-left">
        <h1 class="header-title">Focus Timer</h1>
      </div>
      <div class="header-right">
        <ion-button class="header-icon-btn" fill="clear">
          <ion-icon name="settings-sharp"></ion-icon>
        </ion-button>
        <div class="profile-avatar">
          <ion-icon name="person-circle-outline"></ion-icon>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="main-container">
    
    <!-- Task Selector Card -->
    <div class="task-selector-card" (click)="selectTask()">
      <div class="task-icon">
        <ion-icon name="layers-outline"></ion-icon>
      </div>
      <div class="task-info">
        <span class="task-label">{{ selectedTaskId ? selectedTask?.title : 'Select a task' }}</span>
      </div>
      <div class="task-chevron">
        <ion-icon name="chevron-expand-outline"></ion-icon>
      </div>
    </div>

    <!-- Circular Timer -->
    <div class="timer-section">
      <div class="circular-timer">
        <svg viewBox="0 0 100 100">
          <!-- Background track -->
          <circle cx="50" cy="50" r="45" class="timer-track" />
          <!-- Progress bar -->
          <circle cx="50" cy="50" r="45" class="timer-progress" 
                  [style.stroke-dashoffset]="circularProgressOffset" />
        </svg>
        <div class="timer-text">
          <h1 class="time-remaining">{{ timeDisplay }}</h1>
          <div class="mode-label">
            <span class="dot"></span>
            {{ isBreak ? 'BREAK MODE' : 'FOCUS MODE' }}
          </div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-section">
      <button class="control-btn secondary" (click)="resetTimer()">
        <ion-icon name="refresh-outline"></ion-icon>
      </button>
      
      <button class="control-btn primary" (click)="toggleTimer()">
        <ion-icon [name]="isRunning ? 'pause' : 'play'"></ion-icon>
      </button>

      <button class="control-btn secondary" (click)="stopTimer()">
        <ion-icon name="pause"></ion-icon>
      </button>
    </div>

    <!-- Daily Progress Card -->
    <div class="stats-card">
      <div class="stats-header">
        <span class="stats-title">DAILY PROGRESS</span>
        <span class="stats-goal">Goal: {{ dailyGoalMinutes / 60 }}h</span>
      </div>
      
      <div class="stats-content">
        <div class="stats-left">
          <div class="stats-value">
            <span class="value">{{ (focusedMinutesToday / 60).toFixed(1) }}</span>
            <span class="unit">h</span>
          </div>
          <span class="stats-subtitle">Total focused today</span>
        </div>
        
        <div class="stats-right">
          <!-- Simple bar chart visualization -->
          <div class="bar-chart">
            <div class="bar" style="height: 30%"></div>
            <div class="bar" style="height: 50%"></div>
            <div class="bar" style="height: 70%"></div>
            <div class="bar active" style="height: 90%"></div>
            <div class="bar" style="height: 40%"></div>
            <div class="bar" style="height: 60%"></div>
            <div class="bar" style="height: 20%"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</ion-content>
