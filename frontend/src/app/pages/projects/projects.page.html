<ion-header class="ion-no-border">
  <ion-toolbar class="header-toolbar">
    <div class="header-content ion-padding-horizontal">
      <div class="header-left">
        <h1 class="header-title">Projects</h1>
      </div>
      <div class="header-right">
        <ion-button class="header-icon-btn" fill="clear" (click)="addProject()">
          <ion-icon name="add"></ion-icon>
        </ion-button>
        <div class="profile-avatar">
          <ion-icon name="person-circle-outline"></ion-icon>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding-horizontal">
  <div class="tabs-container">
    <div class="custom-tabs">
      <div 
        class="tab-item" 
        [class.active]="selectedTab === 'all'" 
        (click)="selectedTab = 'all'">
        All Projects
      </div>
      <div 
        class="tab-item" 
        [class.active]="selectedTab === 'in_progress'" 
        (click)="selectedTab = 'in_progress'">
        In Progress
      </div>
      <div 
        class="tab-item" 
        [class.active]="selectedTab === 'completed'" 
        (click)="selectedTab = 'completed'">
        Completed
      </div>
    </div>
  </div>

  <div class="projects-list">
    <div class="project-card" *ngFor="let project of filteredProjects">
      <div class="card-header">
        <div class="category-info">
          <div class="category-dot" [style.background]="project.categoryColor"></div>
          <span class="category-name">{{ project.category }}</span>
        </div>
        <div class="more-options">
          <ion-icon name="ellipsis-horizontal" *ngIf="project.status !== 'completed'"></ion-icon>
          <ion-icon name="checkmark-circle" class="completed-icon" *ngIf="project.status === 'completed'"></ion-icon>
        </div>
      </div>

      <h2 class="project-name" [class.completed]="project.status === 'completed'">{{ project.name }}</h2>

      <div class="progress-section">
        <div class="progress-labels">
          <span class="label-text">{{ project.status === 'completed' ? 'Complete' : 'Progress' }}</span>
          <span class="percentage" [class.completed-text]="project.status === 'completed'">{{ project.progress }}%</span>
        </div>
        <div class="progress-bar-container">
          <div 
            class="progress-bar-fill" 
            [style.width.%]="project.progress"
            [class.completed-fill]="project.status === 'completed'">
          </div>
        </div>
      </div>

      <div class="card-footer">
        <div class="info-items">
          <div class="info-item">
            <ion-icon name="calendar-outline"></ion-icon>
            <span>{{ project.dueDate }}</span>
          </div>
          <div class="info-item" *ngIf="project.tasksCount > 0">
            <ion-icon name="checkmark-circle-outline"></ion-icon>
            <span>{{ project.tasksCount }} tasks</span>
          </div>
        </div>
        <div class="member-avatars" *ngIf="project.members && project.members.length > 0">
          <div class="avatar" *ngFor="let member of project.members">
            <img src="https://i.pravatar.cc/100?u={{member.avatar}}" alt="avatar">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredProjects.length === 0">
    <p>No projects in this category.</p>
  </div>
</ion-content>
