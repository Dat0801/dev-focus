<div class="add-task-container">
  <div class="header">
    <div class="title">Add New Task</div>
    <div class="close-btn" (click)="dismiss()">
      <ion-icon name="close-outline"></ion-icon>
    </div>
  </div>

  <div class="input-group">
    <ion-input
      [(ngModel)]="taskName"
      placeholder="Task name"
      class="task-name-input"
      autofocus="true"
    ></ion-input>
    <ion-textarea
      [(ngModel)]="description"
      placeholder="Description"
      class="description-input"
      auto-grow="true"
      rows="1"
    ></ion-textarea>
  </div>

  <div class="section">
    <div class="label">PROJECT</div>
    <div class="chip-row">
      <div
        *ngFor="let p of projects"
        class="chip project-chip"
        [class.selected]="selectedProjectId === p.id"
        (click)="selectProject(p.id)"
      >
        <span class="dot" [style.background]="p.color"></span>
        {{ p.name }}
      </div>
    </div>
  </div>

  <div class="row">
    <div class="section half">
      <div class="label">PRIORITY</div>
      <div class="chip-row small-gap">
        <div
          *ngFor="let pr of priorities"
          class="chip priority-chip"
          [class]="'p-' + pr.label.toLowerCase()"
          [class.selected]="selectedPriority === pr.value"
          (click)="selectPriority(pr.value)"
        >
          {{ pr.label }}
        </div>
      </div>
    </div>

    <div class="section half">
      <div class="label">DUE DATE</div>
      <div class="date-chip">
        <ion-icon name="calendar-outline"></ion-icon>
        <ion-datetime-button datetime="datetime"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="datetime" presentation="date" [(ngModel)]="dueDate"></ion-datetime>
          </ng-template>
        </ion-modal>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="pomodoro-header">
      <div class="label">ESTIMATED POMODOROS</div>
      <div class="pomodoro-info">
        <ion-icon name="timer"></ion-icon>
        <span>{{ estimatedPomodoros }}{{ estimatedPomodoros === 4 ? '+' : '' }} Pomodoro{{ estimatedPomodoros > 1 ? 's' : '' }}</span>
      </div>
    </div>
    <div class="chip-row full-width">
      <div
        *ngFor="let opt of pomodoroOptions"
        class="chip pomodoro-chip"
        [class.selected]="(opt === '4+' && estimatedPomodoros === 4) || estimatedPomodoros === opt"
        (click)="selectPomodoro(opt)"
      >
        {{ opt }}
      </div>
    </div>
  </div>

  <div class="footer">
    <ion-button expand="block" class="create-button" (click)="createTask()" [disabled]="!taskName">
      <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
      Create Task
    </ion-button>
  </div>
</div>
