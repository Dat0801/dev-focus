<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Tasks</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="addTask()">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment (ionChange)="segmentChanged($event)" value="all">
      <ion-segment-button value="all">All</ion-segment-button>
      <ion-segment-button value="today">Today</ion-segment-button>
      <ion-segment-button value="upcoming">Upcoming</ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list lines="full">
    <ion-item-sliding *ngFor="let task of tasks">
      <ion-item>
        <ion-checkbox slot="start" [checked]="task.status === 'done'" (ionChange)="toggleStatus(task)"></ion-checkbox>
        <ion-label [class.completed]="task.status === 'done'">
          <h2>{{ task.title }}</h2>
          <p>{{ task.description }}</p>
          <ion-badge *ngIf="task.priority" [color]="task.priority === 'high' ? 'danger' : (task.priority === 'medium' ? 'warning' : 'success')">
            {{ task.priority }}
          </ion-badge>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="deleteTask(task)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div class="ion-text-center ion-padding" *ngIf="tasks.length === 0">
    <p>No tasks found.</p>
  </div>
</ion-content>
