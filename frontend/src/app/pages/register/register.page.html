<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="register-container">
    <div class="logo">
      <ion-icon name="flash" color="primary" size="large"></ion-icon>
      <h1>Join DevFocus</h1>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <ion-item lines="full" class="ion-margin-bottom">
        <ion-label position="stacked">Full Name</ion-label>
        <ion-input type="text" formControlName="name" placeholder="John Doe"></ion-input>
      </ion-item>

      <ion-item lines="full" class="ion-margin-bottom">
        <ion-label position="stacked">Email</ion-label>
        <ion-input type="email" formControlName="email" placeholder="email@example.com"></ion-input>
      </ion-item>

      <ion-item lines="full" class="ion-margin-bottom">
        <ion-label position="stacked">Password</ion-label>
        <ion-input type="password" formControlName="password" placeholder="At least 8 characters"></ion-input>
      </ion-item>

      <ion-item lines="full" class="ion-margin-bottom">
        <ion-label position="stacked">Confirm Password</ion-label>
        <ion-input type="password" formControlName="password_confirmation" placeholder="Repeat password"></ion-input>
      </ion-item>

      <div class="error" *ngIf="registerForm.hasError('mismatch') && registerForm.get('password_confirmation')?.touched">
        <small class="ion-padding-start" color="danger">Passwords do not match.</small>
      </div>

      <ion-button expand="block" type="submit" [disabled]="registerForm.invalid" class="ion-margin-top">
        Create Account
      </ion-button>
    </form>

    <div class="ion-text-center ion-margin-top">
      <p>Already have an account? <ion-text color="primary" routerLink="/login">Login</ion-text></p>
    </div>
  </div>
</ion-content>
