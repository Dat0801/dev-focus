<ion-header class="ion-no-border">
  <ion-toolbar class="header-toolbar">
    <div class="header-content ion-padding-horizontal">
      <div class="header-left">
        <h1 class="header-title">Dashboard</h1>
      </div>
      <div class="header-right">
        <ion-button class="header-icon-btn" fill="clear">
          <ion-icon name="notifications"></ion-icon>
        </ion-button>
        <div class="profile-avatar">
          <img src="https://ionicframework.com/docs/img/demos/avatar.svg" alt="Avatar" />
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card purple">
      <div class="stat-header">
        <div class="icon-box">
          <ion-icon name="clipboard-outline"></ion-icon>
        </div>
        <div class="badge">+2</div>
      </div>
      <div class="stat-label">Tasks Today</div>
      <div class="stat-value">{{ metrics.tasks_today || 12 }}</div>
    </div>

    <div class="stat-card blue">
      <div class="stat-header">
        <div class="icon-box">
          <ion-icon name="checkmark-circle-outline"></ion-icon>
        </div>
        <div class="badge">+5</div>
      </div>
      <div class="stat-label">Completed</div>
      <div class="stat-value">{{ metrics.completed_today || 8 }}</div>
    </div>

    <div class="stat-card green">
      <div class="stat-header">
        <div class="icon-box">
          <ion-icon name="timer-outline"></ion-icon>
        </div>
        <div class="badge">+30m</div>
      </div>
      <div class="stat-label">Focus Time</div>
      <div class="stat-value">4.5h</div>
    </div>

    <div class="stat-card yellow">
      <div class="stat-header">
        <div class="icon-box">
          <ion-icon name="flame-outline"></ion-icon>
        </div>
        <div class="badge">+1</div>
      </div>
      <div class="stat-label">Streak</div>
      <div class="stat-value">15d</div>
    </div>
  </div>

  <!-- Daily Performance -->
  <div class="section-title">Daily Performance</div>
  <div class="performance-card">
    <div class="circular-chart">
      <svg viewBox="0 0 36 36" class="circular-progress">
        <path class="circle-bg"
          d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
        />
        <path class="circle"
          stroke-dasharray="70, 100"
          d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
        />
      </svg>
      <div class="chart-content">
        <span class="percentage">70%</span>
        <span class="label">OF DAILY GOAL</span>
      </div>
    </div>

    <div class="bar-chart">
      <div class="bar-item" *ngFor="let day of ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN']; let i = index">
        <div class="bar" [style.height.%]="[30, 45, 35, 55, 25, 75, 10][i]"></div>
        <div class="day-label">{{ day }}</div>
      </div>
    </div>
  </div>

  <!-- Upcoming Tasks -->
  <div class="section-header">
    <div class="section-title">Upcoming Tasks</div>
    <div class="view-all">View all</div>
  </div>

  <div class="task-list">
    <div class="task-item" *ngFor="let task of upcomingTasks" [class.completed]="task.completed">
      <div class="task-check">
        <ion-icon *ngIf="task.completed" name="checkmark-circle"></ion-icon>
        <div *ngIf="!task.completed" class="checkbox"></div>
      </div>
      <div class="task-info">
        <h3>{{ task.title }}</h3>
        <p>{{ task.time }} • {{ task.priority }}</p>
      </div>
      <div *ngIf="task.userInitials && !task.completed" class="task-avatar">{{ task.userInitials }}</div>
      <div *ngIf="!task.userInitials && !task.completed" class="task-more">
        <ion-icon name="ellipsis-vertical"></ion-icon>
      </div>
    </div>
  </div>

  <!-- Floating Action Button -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button class="main-fab">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
